<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxCars – Conversíveis</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Helvetica Neue', sans-serif; color: white; background-color: #000; }

    /* HEADER */
    .lux-header {
      width: 100%;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 60px;
      background-color: rgba(0, 0, 0, 0.85);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      backdrop-filter: blur(6px);
    }
    .logo { font-size: 1.8rem; font-weight: bold; color: white; }
    .gold { color: #d4af37; }
    nav a { color: white; text-decoration: none; margin-left: 25px; font-size: 1rem; transition: color 0.3s ease; }
    nav a:hover, nav a.active { color: #d4af37; }

    /* CONTEÚDO PRINCIPAL */
    .main-content { display: flex; flex-direction: column; height: 100vh; padding-top: 70px; }
    .container { display: flex; flex: 1; width: 100%; }
    .car { flex: 1; position: relative; transition: flex 0.6s ease-in-out, filter 0.5s ease; background-size: cover; background-position: center; cursor: pointer; filter: brightness(65%); }
    .car:hover { flex: 2; filter: brightness(100%); }
    .overlay { position: absolute; top: 30px; left: 40px; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 5px; font-size: 1.6rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #d4af37; text-shadow: 0 0 10px rgba(0,0,0,0.9); }

    /* IMAGENS */
    .porsche { background-image: url('../img/p1.webp'); }
    .aston { background-image: url('../img/a1.webp'); }

    /* FOOTER */
    footer { margin-top: 40px; background: rgba(0,0,0,0.85); color: #999; text-align: center; line-height: 50px; font-size: 0.9rem; padding: 10px; backdrop-filter: blur(5px); border-top: 1px solid rgba(255,215,0,0.1); }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      .container { flex-direction: column; }
      .car { height: 50vh; }
      .car:hover { flex: 2; height: 60vh; }
      .overlay { font-size: 1.2rem; left: 20px; top: 20px; padding: 8px 18px; }
    }

    /* FADE */
    .fade-out { animation: fadeOut 0.7s ease forwards; }
    @keyframes fadeOut { to { opacity: 0; transform: scale(1.05); } }
  </style>
</head>
<body>
  <header class="lux-header">
    <div class="logo"><span class="gold">Lux</span>Cars</div>
    <nav id="navbar">
      <a href="../HTML/index.html">Início</a>
      <a href="../HTML/categorias.html">Categorias</a>
      <a href="../HTML/perfil.html">Perfil</a>
      <a href="../HTML/login.html" id="loginLink">Entrar</a>
      <a href="#" id="logoutLink" style="display:none;">Sair</a>
    </nav>
  </header>

  <div class="main-content">
    <div class="container">
      <div class="car porsche" onclick="redirectWithFade('porche.html')">
        <div class="overlay">Porsche 911</div>
      </div>
      <div class="car aston" onclick="redirectWithFade('altsn.html')">
        <div class="overlay">Aston Martin Vantage</div>
      </div>
    </div>
  </div>

  <footer>© 2025 <span class="gold">LuxCars</span></footer>

  <script>
    function redirectWithFade(url) {
      document.body.classList.add('fade-out');
      setTimeout(() => { window.location.href = url; }, 600);
    }
  </script>
</body>
</html>
